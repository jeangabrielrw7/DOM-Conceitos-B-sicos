<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM: Página Interativa com JavaScript</title>
</head>
<body>

    <h1>DOM: Página Interativa com JavaScript</h1>

    <div>
        <button id="increment-btn">Incrementar</button>
        <button id="decrement-btn">Decrementar</button>
        <span id="counter-display">0</span>
    </div>

    <br>

    <div>
        <input type="text" id="text-input" placeholder="Digite algo...">
        <p id="char-count">0 caracteres</p>
        <div id="dynamic-text-container"></div>
    </div>

    <br>

    <div>
        <label for="list-type">Escolha o tipo de lista:</label>
        <select id="list-type">
            <option value="ul">Lista Não Ordenada</option>
            <option value="ol">Lista Ordenada</option>
        </select>
        <button id="add-list-btn">Adicionar Lista</button>
        <div id="lists-container"></div>
    </div>

    <br>

    <button id="reset-btn">Resetar Tudo</button>

    <script src="script.js"></script>
</body>
</html>
